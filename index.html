<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Knooppunten</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ─────────────────────────────────────── */
:root{
  --orange:   #FF7A00;
  --green:    #008F24;
  --white:    #F8FAF8;
  --gray:     #6B7280;
  --dark:     #1A1A1A;
  --green-dk: #006B1B;
  --surface:  rgba(26,26,26,0.96);
  --radius:   10px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;overflow:hidden;
  background:var(--dark);color:var(--white);
  font-family:'Afacad Flux',sans-serif;
}
#map{position:absolute;inset:0;bottom:68px}

/* ── Route bar ─────────────────────────────────────────── */
#route-bar{
  position:absolute;bottom:0;left:0;right:0;height:68px;
  background:var(--surface);border-top:2px solid rgba(255,122,0,0.25);
  display:flex;align-items:center;gap:10px;padding:0 14px;
  z-index:1000;
}
#node-display{
  display:flex;align-items:center;gap:8px;flex:1;overflow-x:auto;
  scrollbar-width:none;
}
#node-display::-webkit-scrollbar{display:none}
.node-chip{
  background:var(--green);border:3px solid var(--white);
  color:var(--white);font-size:16px;font-weight:700;
  padding:5px 13px;border-radius:999px;letter-spacing:0.3px;
  flex-shrink:0;transition:all 0.15s;
}
.node-chip.active{
  background:var(--green);border-color:var(--orange);
  box-shadow:0 0 0 3px var(--orange);
}
.node-arrow{color:var(--orange);font-size:16px;flex-shrink:0;font-weight:700}
#btn-undo{
  background:transparent;border:1.5px solid var(--gray);color:var(--gray);
  padding:8px 14px;border-radius:var(--radius);font-size:14px;
  font-family:'Afacad Flux',sans-serif;font-weight:600;
  cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all 0.15s;
}
#btn-undo:hover{border-color:var(--orange);color:var(--orange)}
#btn-undo:disabled{opacity:0.2;cursor:not-allowed}

/* ── Nav bord ──────────────────────────────────────────── */
#nav-board{
  position:absolute;top:14px;right:14px;z-index:1001;display:none;
}
.knooppunt-bord{
  background:var(--green);border:4px solid var(--white);
  border-radius:12px;padding:12px 16px;min-width:130px;
  box-shadow:0 6px 24px rgba(0,0,0,0.45);
}
.bord-label{
  font-size:10px;color:rgba(248,250,248,0.7);
  text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:2px;font-weight:600;
}
.bord-nr{
  font-size:52px;font-weight:900;color:var(--white);
  line-height:1;text-align:center;letter-spacing:-1px;
}
.bord-divider{height:2px;background:rgba(255,255,255,0.25);margin:10px 0}
.bord-next-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.bord-next-nr{font-size:28px;font-weight:900;color:var(--white)}
.bord-pijl{font-size:28px;color:var(--white);line-height:1}
.bord-afstand{
  font-size:11px;color:rgba(248,250,248,0.7);
  text-align:center;margin-top:8px;font-weight:600;letter-spacing:0.5px;
}

/* ── Locate button ─────────────────────────────────────── */
#locate-btn{
  position:absolute;top:14px;left:14px;z-index:1001;
  background:var(--surface);border:2px solid var(--orange);
  color:var(--orange);width:44px;height:44px;border-radius:var(--radius);
  font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);transition:all 0.15s;
}
#locate-btn:hover{background:var(--orange);color:var(--white)}

/* ── Status toast ──────────────────────────────────────── */
#status{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  z-index:1002;background:var(--surface);border:1.5px solid rgba(255,122,0,0.4);
  border-radius:8px;padding:9px 20px;font-size:13px;color:var(--white);
  font-weight:600;pointer-events:none;transition:opacity 0.4s;
  white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,0.4);
}
#status.hidden{opacity:0}

/* ── Loading overlay ───────────────────────────────────── */
#loading{
  position:absolute;inset:0;background:var(--dark);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
#loading.gone{display:none}
.spinner{
  width:40px;height:40px;border:3px solid rgba(255,122,0,0.2);
  border-top-color:var(--orange);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:var(--gray);font-weight:600;letter-spacing:0.3px}

/* ── Leaflet overrides (lichte kaart) ─────────────────── */
.leaflet-container{background:#f2efe9}
.leaflet-control-zoom a{
  background:var(--surface)!important;color:var(--white)!important;
  border-color:#333!important;font-size:18px!important;
  width:36px!important;height:36px!important;line-height:36px!important;
}
.leaflet-control-zoom a:hover{background:var(--orange)!important;border-color:var(--orange)!important}
.leaflet-control-attribution{
  background:rgba(248,250,248,0.85)!important;
  color:var(--gray)!important;font-size:10px!important;
}
.leaflet-control-scale-line{
  background:rgba(248,250,248,0.9)!important;
  border:1.5px solid var(--dark)!important;
  border-top:none!important;
  color:var(--dark)!important;
  font-family:'Afacad Flux',sans-serif!important;
  font-size:11px!important;font-weight:700!important;
  padding:2px 5px!important;
  border-radius:0 0 4px 4px!important;
  box-shadow:0 1px 4px rgba(0,0,0,0.15)!important;
}

/* ── Cluster markers ───────────────────────────────────── */
.cluster-pill{
  background:#F8FAF8;
  border:2px solid #F8FAF8;
  border-radius:999px;
  color:#008F24;
  font-family:'Afacad Flux',sans-serif;
  font-size:15px;font-weight:700;
  padding:6px 14px;
  white-space:nowrap;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
  display:inline-flex;align-items:center;gap:6px;
  cursor:pointer;
  line-height:1;
}
.cluster-icon{
  width:18px;height:18px;border-radius:50%;
  border:2.5px solid #008F24;
  display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
/* Verberg de standaard markercluster achtergrond */
.marker-cluster { background:transparent !important; box-shadow:none !important; }
.marker-cluster div { display:none !important; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Locatie bepalen...</div>
</div>

<div id="map"></div>

<button id="locate-btn" onclick="locateUser()" title="Mijn locatie" aria-label="Mijn locatie">⊕</button>
<div id="status" class="hidden">Laden...</div>

<div id="nav-board">
  <div class="knooppunt-bord">
    <div class="bord-label">je bent bij</div>
    <div class="bord-nr" id="bord-huidig">—</div>
    <div class="bord-divider"></div>
    <div class="bord-next-row">
      <div class="bord-next-nr" id="bord-volgende">—</div>
      <div class="bord-pijl" id="bord-pijl">→</div>
    </div>
    <div class="bord-afstand" id="bord-afstand">volgende knooppunt</div>
  </div>
</div>

<div id="route-bar">
  <div id="node-display">
    <span style="color:#444;font-size:13px">Selecteer een knooppunt om te starten</span>
  </div>
  <button id="btn-undo" onclick="undoLast()" disabled aria-label="Ongedaan maken">↩ Undo</button>
</div>

<script>
const map = L.map('map', {
  zoomControl: false,
  attributionControl: true
}).setView([52.1, 5.1], 8);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);
L.control.scale({ position: 'bottomright', imperial: false, maxWidth: 100 }).addTo(map);

let userPos = null;
let userMarker = null;
let routePolylines = [];
let selectedNodes = [];

// ─── Cluster groep ────────────────────────────────────────
function roundedCount(n) {
  if (n < 10)  return `${n}`;
  if (n < 20)  return '10+';
  if (n < 50)  return '20+';
  if (n < 100) return '50+';
  return '100+';
}

const clusterGroup = L.markerClusterGroup({
  // Geen vast zoomniveau — clustering op basis van pixel-afstand (dichtheid)
  disableClusteringAtZoom: null,
  maxClusterRadius: 60, // pixels; kleiner = eerder splitsen
  spiderfyOnMaxZoom: false,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  iconCreateFunction(cluster) {
    const count = cluster.getChildCount();
    const label = roundedCount(count);
    return L.divIcon({
      html: `<div class="cluster-pill"><span class="cluster-icon"></span>${label}</div>`,
      className: '',
      iconAnchor: [0, 0],
    });
  }
});
clusterGroup.addTo(map);

// ─── Traject-laag (edges) ─────────────────────────────────
const EDGE_ZOOM_THRESHOLD = 13;
let edgeLayer = null;
let edgesLoaded = false;

async function loadEdges() {
  try {
    const res = await fetch('./edges.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const scale = data.scale || 10000;
    const polylines = [];

    for (const edge of data.edges) {
      let coords;
      if (data.delta) {
        // Delta-decoding: eerste twee waarden zijn absolute coördinaat,
        // daarna paren van verschillen optellen
        coords = [];
        let lat = edge[0] / scale;
        let lon = edge[1] / scale;
        coords.push([lat, lon]);
        for (let i = 2; i < edge.length; i += 2) {
          lat += edge[i]     / scale;
          lon += edge[i + 1] / scale;
          coords.push([lat, lon]);
        }
      } else {
        coords = edge.coords || edge;
      }
      polylines.push(
        L.polyline(coords, {
          color: '#F8FAF8',
          weight: 1.5,
          opacity: 0.7,
          interactive: false
        })
      );
    }

    edgeLayer = L.layerGroup(polylines);
    edgesLoaded = true;
    console.log(`${data.count} trajecten geladen`);
    updateEdgeVisibility();
  } catch (e) {
    console.warn('edges.json niet gevonden — trajecten niet beschikbaar');
  }
}

function updateEdgeVisibility() {
  if (!edgesLoaded || !edgeLayer) return;
  const zoom = map.getZoom();
  if (zoom >= EDGE_ZOOM_THRESHOLD) {
    if (!map.hasLayer(edgeLayer)) {
      edgeLayer.addTo(map);
      // Zorg dat de edge-laag onder de clusterGroup blijft
      edgeLayer.getPane && edgeLayer.eachLayer(l => l.bringToBack?.());
    }
  } else {
    if (map.hasLayer(edgeLayer)) map.removeLayer(edgeLayer);
  }
}

map.on('zoomend', updateEdgeVisibility);

// ─── Status ───────────────────────────────────────────────
function showStatus(msg, autohide = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.remove('hidden');
  if (autohide) setTimeout(() => el.classList.add('hidden'), 2500);
}
function hideStatus() {
  document.getElementById('status').classList.add('hidden');
}
function hideLoading() {
  document.getElementById('loading').classList.add('gone');
}

// ─── Locatie ──────────────────────────────────────────────
function locateUser() {
  showStatus('Locatie bepalen...');
  if (!navigator.geolocation) {
    showStatus('GPS niet beschikbaar — klik op de kaart');
    hideLoading();
    map.on('click', onMapClick);
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => { setUserPos([pos.coords.latitude, pos.coords.longitude]); },
    () => {
      showStatus('Locatie geweigerd — klik op de kaart');
      hideLoading();
      map.on('click', onMapClick);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function onMapClick(e) {
  map.off('click', onMapClick);
  setUserPos([e.latlng.lat, e.latlng.lng]);
}

function setUserPos(latlng) {
  userPos = latlng;
  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.circleMarker(latlng, {
    radius: 10, fillColor: '#FF7A00', color: '#F8FAF8', weight: 3, fillOpacity: 1
  }).addTo(map).bindTooltip('Jouw locatie', { permanent: false });
  map.setView(latlng, 14);
  hideLoading();
}

// nodeCache: id -> { node: {id, lat, lon, tags}, marker: L.Marker|null }
const nodeCache = new Map();
let nodesReady = false;

// ─── Data laden uit nodes.json ────────────────────────────
async function loadAllNodes() {
  showStatus('Knooppunten laden...');
  try {
    const res = await fetch('./nodes.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    data.nodes.forEach(n => {
      nodeCache.set(n.id, {
        node: { id: n.id, lat: n.lat, lon: n.lon, tags: { rcn_ref: n.ref } },
        marker: null
      });
    });

    nodesReady = true;
    const date = new Date(data.generated).toLocaleDateString('nl-NL');
    console.log(`${data.count} knooppunten geladen (gegenereerd: ${date})`);
    showStatus(`${data.count} knooppunten geladen`, true);
    renderAllNodes();
  } catch (e) {
    showStatus('nodes.json niet gevonden — zet het bestand naast index.html', true);
    console.error(e);
  }
}

// Toon alle nodes direct op de kaart
function renderAllNodes() {
  nodeCache.forEach((entry) => {
    if (!entry.marker) {
      entry.marker = createNodeMarker(entry.node);
    }
  });
}

function haversine([lat1, lon1], [lat2, lon2]) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(Δφ / 2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ─── Markers ──────────────────────────────────────────────
function markerHtml(nr, isSelected) {
  const size = 52;
  const bg           = isSelected ? '#008F24' : '#F8FAF8';
  const borderColor  = isSelected ? '#F8FAF8' : '#008F24';
  const textColor    = isSelected ? '#F8FAF8' : '#008F24';
  const borderWidth  = 3;
  const shadow       = isSelected
    ? '0 0 0 3px #FF7A00, 0 4px 16px rgba(0,0,0,0.35)'
    : '0 3px 10px rgba(0,0,0,0.28)';
  return `<div style="
    width:${size}px;height:${size}px;border-radius:50%;
    background:${bg};
    border:${borderWidth}px solid ${borderColor};
    box-shadow:${shadow};
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    font-family:'Afacad Flux',sans-serif;
    font-size:${nr.length > 2 ? '16px' : '20px'};
    font-weight:900;color:${textColor};
    letter-spacing:-0.5px;
    user-select:none;-webkit-user-select:none;
  ">${nr}</div>`;
}

function createNodeMarker(node) {
  const nr = node.tags.rcn_ref;
  const isSelected = selectedNodes.some(s => s.id === node.id);
  const icon = L.divIcon({
    html: markerHtml(nr, isSelected),
    className: '',
    iconAnchor: [26, 26],
    iconSize: [52, 52]
  });
  const m = L.marker([node.lat, node.lon], { icon })
    .on('click', () => selectNode(node));
  clusterGroup.addLayer(m);
  return m;
}

function updateMarkerStyle(marker, nodeId) {
  const entry = nodeCache.get(nodeId);
  if (!entry) return;
  const nr = entry.node.tags.rcn_ref;
  const isSelected = selectedNodes.some(s => s.id === nodeId);
  marker.setIcon(L.divIcon({
    html: markerHtml(nr, isSelected),
    className: '',
    iconAnchor: [26, 26],
    iconSize: [52, 52]
  }));
}

function refreshAllMarkerStyles() {
  nodeCache.forEach((entry, id) => {
    if (entry.marker) updateMarkerStyle(entry.marker, id);
  });
}

// ─── Selectie & routing ───────────────────────────────────
async function selectNode(node) {
  if (selectedNodes.some(s => s.id === node.id)) return;

  const prev = selectedNodes.length > 0 ? selectedNodes[selectedNodes.length - 1] : null;
  selectedNodes.push(node);
  updateRouteBar();
  refreshAllMarkerStyles();
  document.getElementById('btn-undo').disabled = false;

  if (prev) {
    showStatus('Route berekenen...');
    const coords = await fetchRoute(prev, node);
    if (coords) {
      const pl = L.polyline(coords, {
        color: '#FF7A00', weight: 5, opacity: 0.9,
        lineJoin: 'round', lineCap: 'round'
      }).addTo(map);
      routePolylines.push(pl);
    }
    hideStatus();
  }

  updateNavBoard();
  await loadNodesAround([node.lat, node.lon]);
}

async function fetchRoute(from, to) {
  const url = `https://brouter.de/brouter?lonlats=${from.lon},${from.lat}|${to.lon},${to.lat}&profile=trekking&alternativeidx=0&format=geojson`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.features && data.features[0]) {
      return data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
    }
  } catch (e) {}
  // Fallback: rechte lijn
  return [[from.lat, from.lon], [to.lat, to.lon]];
}

// ─── Undo ─────────────────────────────────────────────────
function undoLast() {
  if (selectedNodes.length === 0) return;
  selectedNodes.pop();
  if (routePolylines.length > 0) map.removeLayer(routePolylines.pop());

  updateRouteBar();
  updateNavBoard();
  refreshAllMarkerStyles();
  document.getElementById('btn-undo').disabled = selectedNodes.length === 0;

  const center = selectedNodes.length === 0
    ? userPos
    : [selectedNodes[selectedNodes.length - 1].lat, selectedNodes[selectedNodes.length - 1].lon];

  if (center) loadNodesAround(center);
}

// ─── UI updates ───────────────────────────────────────────
function updateRouteBar() {
  const el = document.getElementById('node-display');
  if (selectedNodes.length === 0) {
    el.innerHTML = '<span style="color:#444;font-size:13px">Selecteer een knooppunt om te starten</span>';
    return;
  }
  let html = '';
  selectedNodes.forEach((n, i) => {
    const nr = n.tags.rcn_ref;
    const isLast = i === selectedNodes.length - 1;
    html += `<span class="node-chip${isLast ? ' active' : ''}">${nr}</span>`;
    if (!isLast) html += `<span class="node-arrow">›</span>`;
  });
  el.innerHTML = html;
  // Scroll naar einde
  el.scrollLeft = el.scrollWidth;
}

function getBearing(from, to) {
  const φ1 = from.lat * Math.PI / 180, φ2 = to.lat * Math.PI / 180;
  const Δλ = (to.lon - from.lon) * Math.PI / 180;
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function bearingToArrow(deg) {
  const arrows = ['↑', '↗', '→', '↘', '↓', '↙', '←', '↖'];
  return arrows[Math.round(deg / 45) % 8];
}

function updateNavBoard() {
  const board = document.getElementById('nav-board');
  if (selectedNodes.length < 1) { board.style.display = 'none'; return; }
  board.style.display = 'block';

  const current = selectedNodes[selectedNodes.length - 1];
  const prev = selectedNodes.length >= 2 ? selectedNodes[selectedNodes.length - 2] : null;
  document.getElementById('bord-huidig').textContent = current.tags.rcn_ref;

  if (prev) {
    const bearing = getBearing(prev, current);
    document.getElementById('bord-volgende').textContent = current.tags.rcn_ref;
    document.getElementById('bord-pijl').textContent = bearingToArrow(bearing);
    const d = Math.round(haversine([prev.lat, prev.lon], [current.lat, current.lon]));
    document.getElementById('bord-afstand').textContent = d >= 1000
      ? (d / 1000).toFixed(1) + ' km'
      : d + ' m';
  } else {
    document.getElementById('bord-volgende').textContent = '?';
    document.getElementById('bord-pijl').textContent = '→';
    document.getElementById('bord-afstand').textContent = 'selecteer volgend punt';
  }
}

// ─── Start ────────────────────────────────────────────────
loadAllNodes();
loadEdges();
locateUser();
</script>
</body>
</html>
