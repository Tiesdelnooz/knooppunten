<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Knooppunten</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ─────────────────────────────────────── */
:root{
  --orange:  #FF7A00;
  --green:   #008F24;
  --white:   #F8FAF8;
  --gray:    #6B7280;
  --dark:    #1A1A1A;
  --surface: rgba(26,26,26,0.96);
  --radius:  10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --summary-h: 0px; /* wordt via JS gezet als summary zichtbaar is */
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--dark);color:var(--white);font-family:'Afacad Flux',sans-serif}

#map{position:absolute;inset:0;bottom:var(--summary-h);transition:bottom 0.25s ease}

/* ── Route summary ─────────────────────────────────────── */
#route-summary{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:2px solid rgba(255,122,0,0.25);
  z-index:1000;
  transform:translateY(100%);
  transition:transform 0.25s ease;
  padding-bottom:var(--safe-bot);
}
#route-summary.visible{transform:translateY(0)}

#summary-stats{
  display:flex;align-items:center;justify-content:center;
  gap:16px;padding:10px 16px 6px;
  font-size:13px;font-weight:600;color:var(--gray);
  letter-spacing:0.3px;
}
#summary-stats span{color:var(--white)}

#summary-chips{
  display:flex;align-items:center;gap:0;
  padding:0 14px 12px;
  overflow-x:auto;scrollbar-width:none;
}
#summary-chips::-webkit-scrollbar{display:none}

.chip-wrap{display:flex;align-items:center;gap:0;flex-shrink:0}
.node-chip{
  width:44px;height:44px;border-radius:50%;
  background:var(--green);border:3px solid var(--white);
  color:var(--white);font-size:15px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.15s;
  letter-spacing:-0.5px;
}
.node-chip.last{
  border-color:var(--orange);
  box-shadow:0 0 0 3px var(--orange);
}
.node-chip:active{transform:scale(0.92)}
.chip-line{
  width:20px;height:3px;background:var(--orange);flex-shrink:0;
}

/* ── Locate button ─────────────────────────────────────── */
#locate-btn{
  position:absolute;
  top:calc(14px + var(--safe-top));
  left:14px;z-index:1001;
  background:var(--white);border:none;
  color:var(--green);width:44px;height:44px;border-radius:999px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,0.2);transition:all 0.15s;
}
#locate-btn svg{width:20px;height:20px;stroke:var(--green)}
#locate-btn:hover{background:var(--green)}
#locate-btn:hover svg{stroke:var(--white)}

/* ── Status toast ──────────────────────────────────────── */
#status{
  position:absolute;top:calc(14px + var(--safe-top));left:50%;transform:translateX(-50%);
  z-index:1002;background:var(--surface);border:1.5px solid rgba(255,122,0,0.4);
  border-radius:8px;padding:9px 20px;font-size:13px;color:var(--white);
  font-weight:600;pointer-events:none;transition:opacity 0.4s;
  white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,0.4);
}
#status.hidden{opacity:0}

/* ── Loading overlay ───────────────────────────────────── */
#loading{
  position:absolute;inset:0;background:var(--dark);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
#loading.gone{display:none}
.spinner{width:40px;height:40px;border:3px solid rgba(255,122,0,0.2);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:var(--gray);font-weight:600}

/* ── Leaflet ───────────────────────────────────────────── */
.leaflet-container{background:#f2efe9}
.leaflet-control-attribution{background:rgba(248,250,248,0.85)!important;color:var(--gray)!important;font-size:10px!important}
.leaflet-control-scale-line{
  background:rgba(248,250,248,0.9)!important;border:1.5px solid var(--dark)!important;
  border-top:none!important;color:var(--dark)!important;
  font-family:'Afacad Flux',sans-serif!important;font-size:11px!important;font-weight:700!important;
  padding:2px 5px!important;border-radius:0 0 4px 4px!important;
}

/* ── Clusters ──────────────────────────────────────────── */
.cluster-pill{
  background:var(--white);border:2px solid var(--white);border-radius:999px;
  color:var(--green);font-family:'Afacad Flux',sans-serif;
  font-size:15px;font-weight:700;padding:6px 14px;
  white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.2);
  display:inline-flex;align-items:center;gap:6px;cursor:pointer;line-height:1;
}
.cluster-icon{width:18px;height:18px;border-radius:50%;border:2.5px solid var(--green);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.marker-cluster{background:transparent!important;box-shadow:none!important}
.marker-cluster div{display:none!important}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Laden...</div>
</div>

<div id="map"></div>

<button id="locate-btn" onclick="locateUser()" title="Mijn locatie" aria-label="Mijn locatie">
  <i data-feather="crosshair"></i>
</button>
<div id="status" class="hidden"></div>

<div id="route-summary">
  <div id="summary-stats">
    <span id="stat-nodes">0</span> knooppunten &nbsp;|&nbsp; <span id="stat-dist">0 km</span>
  </div>
  <div id="summary-chips"></div>
</div>

<script>
// ─── Kaart ────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false, attributionControl: true }).setView([52.1, 5.1], 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);
L.control.scale({ position: 'bottomright', imperial: false, maxWidth: 100 }).addTo(map);

// ─── State ────────────────────────────────────────────────
let userPos   = null;
let userMarker = null;
let selectedNodes = [];   // [{key, ref, lat, lon, tags, locations}, ...]
let routePolylines = [];  // L.Polyline per segment
let totalDistance = 0;    // meters

// ─── Cluster groep (ongeselecteerde nodes) ────────────────
function roundedCount(n) {
  if (n < 10) return `${n}`;
  if (n < 20) return '10+';
  if (n < 50) return '20+';
  if (n < 100) return '50+';
  return '100+';
}

const clusterGroup = L.markerClusterGroup({
  disableClusteringAtZoom: null,
  maxClusterRadius: 60,
  spiderfyOnMaxZoom: false,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  iconCreateFunction(cluster) {
    return L.divIcon({
      html: `<div class="cluster-pill"><span class="cluster-icon"></span>${roundedCount(cluster.getChildCount())}</div>`,
      className: '', iconAnchor: [0, 0]
    });
  }
});
clusterGroup.addTo(map);

// Aparte laag voor geselecteerde nodes — nooit geclusterd
const selectedLayer = L.layerGroup().addTo(map);

// ─── Status ───────────────────────────────────────────────
function showStatus(msg, autohide = false) {
  const el = document.getElementById('status');
  el.textContent = msg; el.classList.remove('hidden');
  if (autohide) setTimeout(() => el.classList.add('hidden'), 2500);
}
function hideStatus() { document.getElementById('status').classList.add('hidden'); }
function hideLoading() { document.getElementById('loading').classList.add('gone'); }

// ─── Locatie ──────────────────────────────────────────────
function locateUser() {
  showStatus('Locatie bepalen...');
  if (!navigator.geolocation) {
    showStatus('GPS niet beschikbaar — klik op de kaart');
    hideLoading(); map.on('click', onMapClick); return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => setUserPos([pos.coords.latitude, pos.coords.longitude]),
    () => { showStatus('Locatie geweigerd — klik op de kaart'); hideLoading(); map.on('click', onMapClick); },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}
function onMapClick(e) { map.off('click', onMapClick); setUserPos([e.latlng.lat, e.latlng.lng]); }
function setUserPos(latlng) {
  userPos = latlng;
  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.circleMarker(latlng, {
    radius: 10, fillColor: '#FF7A00', color: '#F8FAF8', weight: 3, fillOpacity: 1
  }).addTo(map);
  map.setView(latlng, 14);
  hideLoading(); hideStatus();
}

// ─── Node cache ───────────────────────────────────────────
const nodeCache = new Map(); // key -> { node, marker }
let nodesReady = false;

async function loadAllNodes() {
  try {
    const res = await fetch('./nodes.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    data.nodes.forEach(n => {
      const key = `${n.ref}_${n.lat}_${n.lon}`;
      nodeCache.set(key, {
        node: { key, ref: n.ref, lat: n.lat, lon: n.lon,
                locations: n.locations || [{ lat: n.lat, lon: n.lon }],
                tags: { rcn_ref: n.ref } },
        marker: null
      });
    });
    nodesReady = true;
    console.log(`${data.count} knooppunten geladen`);
    renderAllNodes();
  } catch (e) {
    showStatus('nodes.json niet gevonden', true); console.error(e);
  }
}

function renderAllNodes() {
  nodeCache.forEach(entry => {
    if (!entry.marker) entry.marker = createNodeMarker(entry.node);
  });
}

// ─── Haversine ────────────────────────────────────────────
function haversine([lat1, lon1], [lat2, lon2]) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180, Δλ = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function fmtDist(m) { return m >= 1000 ? (m/1000).toFixed(1)+' km' : Math.round(m)+' m'; }

// ─── Markers ──────────────────────────────────────────────
function markerHtml(nr, selected) {
  const bg   = selected ? '#008F24' : '#F8FAF8';
  const bd   = selected ? '#F8FAF8' : '#008F24';
  const col  = selected ? '#F8FAF8' : '#008F24';
  const shad = selected ? '0 0 0 3px #FF7A00,0 4px 16px rgba(0,0,0,0.35)' : '0 3px 10px rgba(0,0,0,0.28)';
  return `<div style="width:52px;height:52px;border-radius:50%;background:${bg};border:3px solid ${bd};
    box-shadow:${shad};display:flex;align-items:center;justify-content:center;cursor:pointer;
    font-family:'Afacad Flux',sans-serif;font-size:${nr.length>2?'16px':'20px'};font-weight:900;
    color:${col};letter-spacing:-0.5px;user-select:none;-webkit-user-select:none">${nr}</div>`;
}

function createNodeMarker(node) {
  const icon = L.divIcon({ html: markerHtml(node.ref, false), className: '', iconAnchor:[26,26], iconSize:[52,52] });
  const m = L.marker([node.lat, node.lon], { icon }).on('click', () => selectNode(node));
  clusterGroup.addLayer(m);
  return m;
}

// Geselecteerde marker: buiten cluster, altijd zichtbaar
function createSelectedMarker(node, isLast) {
  const icon = L.divIcon({ html: markerHtml(node.ref, true), className: '', iconAnchor:[26,26], iconSize:[52,52] });
  return L.marker([node.lat, node.lon], { icon, zIndexOffset: 1000 })
    .addTo(selectedLayer)
    .on('click', () => deselectIfLast(node));
}

// ─── Selectie ─────────────────────────────────────────────
async function selectNode(node) {
  // Tap op laatste node = deselect
  if (selectedNodes.length > 0 && selectedNodes[selectedNodes.length-1].key === node.key) {
    deselectIfLast(node); return;
  }

  // Bepaal startpunt: userPos bij eerste node, anders vorige node
  const fromNode = selectedNodes.length > 0
    ? selectedNodes[selectedNodes.length-1]
    : null;
  const fromPos  = fromNode
    ? { lat: fromNode.lat, lon: fromNode.lon }
    : userPos ? { lat: userPos[0], lon: userPos[1] } : null;

  selectedNodes.push(node);

  // Verberg in cluster, toon in selectedLayer
  const entry = nodeCache.get(node.key);
  if (entry && entry.marker) clusterGroup.removeLayer(entry.marker);
  const selMarker = createSelectedMarker(node, true);
  if (entry) entry.selMarker = selMarker;

  // Vorige selected marker niet meer "last" — stijl update
  if (selectedNodes.length >= 2) {
    const prev = selectedNodes[selectedNodes.length-2];
    const pe = nodeCache.get(prev.key);
    if (pe && pe.selMarker) {
      pe.selMarker.setIcon(L.divIcon({ html: markerHtml(prev.ref, true), className: '', iconAnchor:[26,26], iconSize:[52,52] }));
    }
  }

  // Route tekenen
  if (fromPos) {
    showStatus('Route berekenen...');
    const coords = await fetchRoute(fromPos, { lat: node.lat, lon: node.lon });
    if (coords) {
      const segDist = coords.reduce((s,c,i) => i===0 ? 0 : s+haversine(coords[i-1],c), 0);
      totalDistance += segDist;
      const pl = L.polyline(coords, { color:'#FF7A00', weight:5, opacity:0.9, lineJoin:'round', lineCap:'round' }).addTo(map);
      routePolylines.push(pl);
    }
    hideStatus();
  }

  updateSummary();
}

function deselectIfLast(node) {
  if (selectedNodes.length === 0) return;
  const last = selectedNodes[selectedNodes.length-1];
  if (last.key !== node.key) return;

  selectedNodes.pop();

  // Verwijder selected marker
  const entry = nodeCache.get(node.key);
  if (entry && entry.selMarker) { selectedLayer.removeLayer(entry.selMarker); delete entry.selMarker; }

  // Zet terug in cluster
  if (entry && entry.marker) clusterGroup.addLayer(entry.marker);

  // Verwijder laatste routesegment
  if (routePolylines.length > 0) {
    const pl = routePolylines.pop();
    // Trek afstand af (benadering via latlngs)
    const lls = pl.getLatLngs();
    const segDist = lls.reduce((s,c,i) => i===0?0:s+haversine([lls[i-1].lat,lls[i-1].lng],[c.lat,c.lng]),0);
    totalDistance = Math.max(0, totalDistance - segDist);
    map.removeLayer(pl);
  }

  // Update "last" stijl op nieuwe laatste node
  if (selectedNodes.length > 0) {
    const newLast = selectedNodes[selectedNodes.length-1];
    const ne = nodeCache.get(newLast.key);
    if (ne && ne.selMarker) {
      ne.selMarker.setIcon(L.divIcon({ html: markerHtml(newLast.ref, true), className: '', iconAnchor:[26,26], iconSize:[52,52] }));
    }
  }

  updateSummary();
}

// ─── Routing ──────────────────────────────────────────────
async function fetchRoute(from, to) {
  const url = `https://brouter.de/brouter?lonlats=${from.lon},${from.lat}|${to.lon},${to.lat}&profile=trekking&alternativeidx=0&format=geojson`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.features && data.features[0])
      return data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
  } catch(e) {}
  return [[from.lat, from.lon], [to.lat, to.lon]];
}

// ─── Route summary ────────────────────────────────────────
function updateSummary() {
  const summary  = document.getElementById('route-summary');
  const chips    = document.getElementById('summary-chips');
  const statN    = document.getElementById('stat-nodes');
  const statD    = document.getElementById('stat-dist');

  if (selectedNodes.length === 0) {
    summary.classList.remove('visible');
    document.documentElement.style.setProperty('--summary-h', '0px');
    return;
  }

  // Chips
  chips.innerHTML = selectedNodes.map((n, i) => {
    const isLast = i === selectedNodes.length - 1;
    const line   = i < selectedNodes.length - 1 ? '<div class="chip-line"></div>' : '';
    return `<div class="chip-wrap">
      <div class="node-chip${isLast?' last':''}" onclick="deselectIfLast(selectedNodes[${i}])">${n.ref}</div>
      ${line}
    </div>`;
  }).join('');

  // Scroll naar einde
  chips.scrollLeft = chips.scrollWidth;

  statN.textContent = selectedNodes.length;
  statD.textContent = fmtDist(totalDistance);

  summary.classList.add('visible');
  // Geef kaart juiste bottom margin
  requestAnimationFrame(() => {
    const h = summary.offsetHeight;
    document.documentElement.style.setProperty('--summary-h', h + 'px');
  });
}

// ─── Start ────────────────────────────────────────────────
feather.replace({ 'stroke-width': 2 });
loadAllNodes();
locateUser();
</script>
</body>
</html>
